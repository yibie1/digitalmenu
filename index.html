<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Menu</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    .menu-group { margin-bottom: 56px; }

    /* ── CART BUTTON ── */
    .cart-fab {
      position: fixed;
      bottom: 28px;
      right: 24px;
      background: #25D366;
      color: #fff;
      border: none;
      border-radius: 50px;
      padding: 14px 22px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 10px;
      box-shadow: 0 6px 24px rgba(37,211,102,0.4);
      z-index: 150;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .cart-fab:hover { transform: scale(1.05); box-shadow: 0 8px 32px rgba(37,211,102,0.5); }
    .cart-fab.hidden { display: none; }
    .cart-count {
      background: #fff;
      color: #25D366;
      border-radius: 50%;
      width: 24px;
      height: 24px;
      font-size: 0.8rem;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 800;
    }

    /* ── CART DRAWER ── */
    .cart-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      z-index: 300;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s;
    }
    .cart-overlay.open { opacity: 1; pointer-events: all; }

    .cart-drawer {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: var(--bg2);
      border-top: 1px solid var(--border);
      border-radius: 20px 20px 0 0;
      z-index: 301;
      max-height: 80vh;
      display: flex;
      flex-direction: column;
      transform: translateY(100%);
      transition: transform 0.3s cubic-bezier(0.32,0.72,0,1);
    }
    .cart-overlay.open .cart-drawer { transform: translateY(0); }

    .cart-handle {
      width: 40px;
      height: 4px;
      background: var(--border);
      border-radius: 2px;
      margin: 12px auto 0;
    }

    .cart-header {
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .cart-header h2 { font-size: 1.1rem; font-weight: 700; }
    .cart-clear {
      background: none;
      border: none;
      color: var(--text-muted);
      font-size: 0.8rem;
      cursor: pointer;
      padding: 4px 8px;
      border-radius: 6px;
    }
    .cart-clear:hover { color: var(--danger); }

    .cart-items {
      overflow-y: auto;
      flex: 1;
      padding: 12px 20px;
    }

    .cart-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 0;
      border-bottom: 1px solid var(--border);
    }
    .cart-item:last-child { border-bottom: none; }
    .cart-item-name { flex: 1; font-size: 0.95rem; font-weight: 600; }
    .cart-item-price { color: var(--primary); font-weight: 700; font-size: 0.9rem; }
    .qty-controls {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .qty-btn {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      border: 1px solid var(--border);
      background: var(--bg3);
      color: var(--text);
      cursor: pointer;
      font-size: 1rem;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s;
    }
    .qty-btn:hover { border-color: var(--primary); color: var(--primary); }
    .qty-num { font-weight: 700; min-width: 20px; text-align: center; }

    .cart-footer {
      padding: 16px 20px 28px;
      border-top: 1px solid var(--border);
    }
    .cart-total {
      display: flex;
      justify-content: space-between;
      font-size: 1rem;
      font-weight: 700;
      margin-bottom: 16px;
    }
    .cart-total span:last-child { color: var(--primary); font-size: 1.2rem; }

    .cart-note-label { font-size: 0.8rem; color: var(--text-muted); margin-bottom: 6px; }
    .cart-note {
      width: 100%;
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      padding: 10px 12px;
      font-size: 0.85rem;
      resize: none;
      outline: none;
      font-family: inherit;
      margin-bottom: 14px;
    }
    .cart-note:focus { border-color: var(--primary); }

    .btn-whatsapp {
      width: 100%;
      background: #25D366;
      color: #fff;
      border: none;
      border-radius: 12px;
      padding: 14px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      transition: background 0.2s;
    }
    .btn-whatsapp:hover { background: #1ebe5d; }

    .order-btns { display: flex; flex-direction: column; gap: 10px; }
    .btn-telegram {
      width: 100%;
      background: #229ED9;
      color: #fff;
      border: none;
      border-radius: 12px;
      padding: 14px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      transition: background 0.2s;
    }
    .btn-telegram:hover { background: #1a8bbf; }

    /* ── ADD TO CART button in modal ── */
    .btn-add-cart {
      width: 100%;
      margin-top: 16px;
      background: var(--primary);
      color: #000;
      border: none;
      border-radius: 10px;
      padding: 13px;
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.2s;
    }
    .btn-add-cart:hover { background: var(--primary-dark); }

    .cart-empty {
      text-align: center;
      padding: 40px 20px;
      color: var(--text-muted);
      font-size: 0.9rem;
    }
  </style>
</head>
<body>

<header class="site-header">
  <div class="logo">
    <div class="logo-icon">🍽</div>
    <div class="logo-text" id="header-name">Bella <span>Cucina</span></div>
  </div>
  <nav class="header-nav">
    <a href="admin.html">Owner ⚙️</a>
  </nav>
</header>

<section class="hero">
  <div class="hero-tag">✦ Est. 2018</div>
  <h1 id="hero-title">Fine Dining &amp; <span>Catering</span></h1>
  <p id="hero-desc">Authentic flavors crafted with passion.</p>
</section>

<div class="category-bar" id="category-bar">
  <button class="cat-btn active" data-cat="all">All</button>
</div>

<main class="menu-section" id="menu-container">
  <div class="empty-state">
    <div class="icon">🍽</div>
    <p>Loading menu…</p>
  </div>
</main>

<!-- ITEM MODAL -->
<div class="modal-overlay" id="modal-overlay" role="dialog" aria-modal="true" aria-labelledby="modal-title">
  <div class="modal-wrapper">
    <button class="modal-close" id="modal-close" aria-label="Close">✕</button>
    <div class="modal" id="modal">
      <div class="modal-img" id="modal-img"></div>
      <div class="modal-body">
        <div class="modal-category" id="modal-category"></div>
        <div class="modal-title" id="modal-title"></div>
        <div class="modal-price" id="modal-price"></div>
        <div class="modal-desc" id="modal-desc"></div>
        <div id="modal-recipe-wrap" style="display:none">
          <div class="modal-recipe-title">Recipe &amp; Ingredients</div>
          <div class="modal-recipe" id="modal-recipe"></div>
        </div>
        <button class="btn-add-cart" id="modal-add-cart">+ Add to Order</button>
      </div>
    </div>
  </div>
</div>

<!-- CART DRAWER -->
<div class="cart-overlay" id="cart-overlay">
  <div class="cart-drawer">
    <div class="cart-handle"></div>
    <div class="cart-header">
      <h2>🛒 Your Order</h2>
      <button class="cart-clear" onclick="clearCart()">Clear all</button>
    </div>
    <div class="cart-items" id="cart-items"></div>
    <div class="cart-footer">
      <div class="cart-total">
        <span>Total</span>
        <span id="cart-total-price">$0.00</span>
      </div>
      <div class="cart-note-label">Special requests / table number</div>
      <textarea class="cart-note" id="cart-note" rows="2" placeholder="e.g. Table 4, no onions, extra sauce…"></textarea>
      <div class="order-btns" id="order-btns"></div>
    </div>
  </div>
</div>

<!-- CART FAB -->
<button class="cart-fab hidden" id="cart-fab" onclick="openCart()">
  <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
  Order
  <span class="cart-count" id="cart-count">0</span>
</button>

<footer>
  <p id="footer-info"></p>
  <p style="margin-top:8px">Managed with <a href="admin.html">Kiro Menu</a></p>
</footer>

<script src="app.js"></script>
<script>
  let allItems = [];
  let restaurantInfo = {};
  let activeCategory = 'all';
  let cart = []; // [{id, title, price, qty}]
  let currentModalItem = null;

  // ── INIT ────────────────────────────────────────────────────
  async function init() {
    const data = await loadMenuFromJSON();
    restaurantInfo = data.restaurant;
    allItems = data.items;

    document.title = `Menu — ${restaurantInfo.name}`;
    document.getElementById('header-name').innerHTML =
      restaurantInfo.name.replace(/(\S+)$/, '<span>$1</span>');
    document.getElementById('hero-title').innerHTML =
      (restaurantInfo.tagline || '').replace(/(\S+)$/, '<span>$1</span>');
    document.getElementById('hero-desc').textContent = restaurantInfo.description || '';
    document.getElementById('footer-info').textContent =
      `${restaurantInfo.name} · ${restaurantInfo.phone} · ${restaurantInfo.address}`;

    buildCategoryBar();
    renderMenu();
    renderOrderButtons();
  }

  // ── CATEGORY BAR ────────────────────────────────────────────
  function buildCategoryBar() {
    const bar = document.getElementById('category-bar');
    const cats = [...new Set(allItems.map(i => i.category))];
    bar.innerHTML = `<button class="cat-btn active" data-cat="all">All</button>`;
    cats.forEach(cat => {
      const btn = document.createElement('button');
      btn.className = 'cat-btn';
      btn.dataset.cat = cat;
      btn.textContent = cat;
      bar.appendChild(btn);
    });
    bar.addEventListener('click', e => {
      const btn = e.target.closest('.cat-btn');
      if (!btn) return;
      bar.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      activeCategory = btn.dataset.cat;
      renderMenu();
    });
  }

  // ── MENU RENDER ─────────────────────────────────────────────
  function renderMenu() {
    const container = document.getElementById('menu-container');
    const filtered = activeCategory === 'all'
      ? allItems
      : allItems.filter(i => i.category === activeCategory);

    if (!filtered.length) {
      container.innerHTML = `<div class="empty-state"><div class="icon">🍽</div><p>No items here yet.</p></div>`;
      return;
    }

    const groups = {};
    filtered.forEach(item => {
      if (!groups[item.category]) groups[item.category] = [];
      groups[item.category].push(item);
    });

    container.innerHTML = Object.entries(groups).map(([cat, items]) => `
      <div class="menu-group">
        <div class="section-title">${cat}</div>
        <div class="menu-grid">
          ${items.map(item => cardHTML(item)).join('')}
        </div>
      </div>
    `).join('');

    container.querySelectorAll('.menu-card').forEach(card => {
      card.addEventListener('click', () => openModal(card.dataset.id));
    });
  }

  function cardHTML(item) {
    const imgContent = item.image
      ? `<img src="${item.image}" alt="${escHtml(item.title)}" loading="lazy" />`
      : (item.emoji || '🍽');
    return `
      <article class="menu-card" data-id="${item.id}" tabindex="0" role="button" aria-label="View ${escHtml(item.title)}">
        <div class="card-img">${imgContent}</div>
        <div class="card-body">
          <div class="card-category">${escHtml(item.category)}</div>
          <div class="card-title">${escHtml(item.title)}</div>
          <div class="card-desc">${escHtml(item.description)}</div>
          <div class="card-footer">
            <div class="card-price">$${escHtml(item.price)}</div>
            ${item.badge ? `<span class="card-badge">${escHtml(item.badge)}</span>` : ''}
          </div>
        </div>
      </article>`;
  }

  // ── MODAL ───────────────────────────────────────────────────
  function openModal(id) {
    const item = allItems.find(i => i.id === id);
    if (!item) return;
    currentModalItem = item;

    const imgEl = document.getElementById('modal-img');
    imgEl.innerHTML = item.image
      ? `<img src="${item.image}" alt="${escHtml(item.title)}" />`
      : (item.emoji || '🍽');

    document.getElementById('modal-category').textContent = item.category;
    document.getElementById('modal-title').textContent = item.title;
    document.getElementById('modal-price').textContent = `$${item.price}`;
    document.getElementById('modal-desc').textContent = item.description;

    const recipeWrap = document.getElementById('modal-recipe-wrap');
    if (item.recipe) {
      document.getElementById('modal-recipe').textContent = item.recipe;
      recipeWrap.style.display = 'block';
    } else {
      recipeWrap.style.display = 'none';
    }

    document.getElementById('modal-overlay').classList.add('open');
    document.body.style.overflow = 'hidden';
  }

  function closeModal() {
    document.getElementById('modal-overlay').classList.remove('open');
    document.body.style.overflow = '';
    currentModalItem = null;
  }

  document.getElementById('modal-close').addEventListener('click', closeModal);
  document.getElementById('modal-overlay').addEventListener('click', e => {
    if (e.target === document.getElementById('modal-overlay')) closeModal();
  });
  document.addEventListener('keydown', e => { if (e.key === 'Escape') { closeModal(); closeCart(); } });

  document.getElementById('modal-add-cart').addEventListener('click', () => {
    if (!currentModalItem) return;
    addToCart(currentModalItem);
    closeModal();
    showToast(`${currentModalItem.title} added to order`);
  });

  // ── CART ────────────────────────────────────────────────────
  function addToCart(item) {
    const existing = cart.find(c => c.id === item.id);
    if (existing) {
      existing.qty++;
    } else {
      cart.push({ id: item.id, title: item.title, price: parseFloat(item.price), qty: 1 });
    }
    updateCartUI();
  }

  function updateCartUI() {
    const total = cart.reduce((s, c) => s + c.price * c.qty, 0);
    const count = cart.reduce((s, c) => s + c.qty, 0);

    document.getElementById('cart-count').textContent = count;
    document.getElementById('cart-fab').classList.toggle('hidden', count === 0);
    document.getElementById('cart-total-price').textContent = `$${total.toFixed(2)}`;

    const itemsEl = document.getElementById('cart-items');
    if (!cart.length) {
      itemsEl.innerHTML = `<div class="cart-empty">Your order is empty.<br>Tap any item to add it.</div>`;
      return;
    }

    itemsEl.innerHTML = cart.map(c => `
      <div class="cart-item">
        <div class="cart-item-name">${escHtml(c.title)}</div>
        <div class="qty-controls">
          <button class="qty-btn" onclick="changeQty('${c.id}', -1)">−</button>
          <span class="qty-num">${c.qty}</span>
          <button class="qty-btn" onclick="changeQty('${c.id}', 1)">+</button>
        </div>
        <div class="cart-item-price">$${(c.price * c.qty).toFixed(2)}</div>
      </div>
    `).join('');
  }

  function changeQty(id, delta) {
    const idx = cart.findIndex(c => c.id === id);
    if (idx === -1) return;
    cart[idx].qty += delta;
    if (cart[idx].qty <= 0) cart.splice(idx, 1);
    updateCartUI();
  }

  function clearCart() {
    cart = [];
    updateCartUI();
  }

  function openCart() {
    document.getElementById('cart-overlay').classList.add('open');
    document.body.style.overflow = 'hidden';
    updateCartUI();
  }

  function closeCart() {
    document.getElementById('cart-overlay').classList.remove('open');
    document.body.style.overflow = '';
  }

  document.getElementById('cart-overlay').addEventListener('click', e => {
    if (e.target === document.getElementById('cart-overlay')) closeCart();
  });

  // ── WHATSAPP / TELEGRAM ORDER ───────────────────────────────
  const WA_ICON = `<svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>`;
  const TG_ICON = `<svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M11.944 0A12 12 0 0 0 0 12a12 12 0 0 0 12 12 12 12 0 0 0 12-12A12 12 0 0 0 12 0a12 12 0 0 0-.056 0zm4.962 7.224c.1-.002.321.023.465.14a.506.506 0 0 1 .171.325c.016.093.036.306.02.472-.18 1.898-.962 6.502-1.36 8.627-.168.9-.499 1.201-.82 1.23-.696.065-1.225-.46-1.9-.902-1.056-.693-1.653-1.124-2.678-1.8-1.185-.78-.417-1.21.258-1.91.177-.184 3.247-2.977 3.307-3.23.007-.032.014-.15-.056-.212s-.174-.041-.249-.024c-.106.024-1.793 1.14-5.061 3.345-.48.33-.913.49-1.302.48-.428-.008-1.252-.241-1.865-.44-.752-.245-1.349-.374-1.297-.789.027-.216.325-.437.893-.663 3.498-1.524 5.83-2.529 6.998-3.014 3.332-1.386 4.025-1.627 4.476-1.635z"/></svg>`;

  function buildOrderMessage() {
    const note = document.getElementById('cart-note').value.trim();
    const total = cart.reduce((s, c) => s + c.price * c.qty, 0);
    let msg = `🍽 *New Order — ${restaurantInfo.name}*\n\n`;
    cart.forEach(c => { msg += `• ${c.title} x${c.qty} — $${(c.price * c.qty).toFixed(2)}\n`; });
    msg += `\n*Total: $${total.toFixed(2)}*`;
    if (note) msg += `\n\n📝 Note: ${note}`;
    return msg;
  }

  function renderOrderButtons() {
    const container = document.getElementById('order-btns');
    if (!container) return;
    const wa = (restaurantInfo.whatsapp || '').replace(/\D/g, '');
    const tg = (restaurantInfo.telegram || '').trim();
    let html = '';
    if (wa) html += `<button class="btn-whatsapp" id="send-whatsapp">${WA_ICON} Order via WhatsApp</button>`;
    if (tg) html += `<button class="btn-telegram" id="send-telegram">${TG_ICON} Order via Telegram</button>`;
    if (!wa && !tg) html = `<p style="color:var(--text-muted);font-size:0.85rem;text-align:center">No ordering channel configured.</p>`;
    container.innerHTML = html;

    if (wa) {
      document.getElementById('send-whatsapp').addEventListener('click', () => {
        if (!cart.length) { showToast('Add items to your order first', 'error'); return; }
        const url = `https://wa.me/${wa}?text=${encodeURIComponent(buildOrderMessage())}`;
        window.open(url, '_blank');
      });
    }
    if (tg) {
      document.getElementById('send-telegram').addEventListener('click', () => {
        if (!cart.length) { showToast('Add items to your order first', 'error'); return; }
        // tg can be a phone number or @username
        const target = /^\d+$/.test(tg) ? tg : tg.replace(/^@/, '');
        const url = `https://t.me/${target}?text=${encodeURIComponent(buildOrderMessage())}`;
        window.open(url, '_blank');
      });
    }
  }

  // ── UTILS ────────────────────────────────────────────────────
  function escHtml(str) {
    return String(str ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  init();
</script>
